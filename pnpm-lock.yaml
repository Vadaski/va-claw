lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      '@huggingface/transformers':
        specifier: latest
        version: 3.8.1
    devDependencies:
      '@types/node':
        specifier: ^24.5.2
        version: 24.12.0
      esbuild:
        specifier: ^0.27.3
        version: 0.27.3
      typescript:
        specifier: file:vendor/typescript
        version: file:vendor/typescript

  packages/channels:
    dependencies:
      '@va-claw/channel-discord':
        specifier: workspace:*
        version: link:discord
      '@va-claw/channel-lark':
        specifier: workspace:*
        version: link:lark
      '@va-claw/channel-slack':
        specifier: workspace:*
        version: link:slack
      '@va-claw/channel-telegram':
        specifier: workspace:*
        version: link:telegram
      '@va-claw/identity':
        specifier: workspace:*
        version: link:../identity

  packages/channels/discord:
    dependencies:
      discord.js:
        specifier: file:../../../vendor/discord.js
        version: file:vendor/discord.js

  packages/channels/lark:
    dependencies:
      '@larksuiteoapi/node-sdk':
        specifier: ^1.59.0
        version: 1.59.0

  packages/channels/slack:
    dependencies:
      '@slack/bolt':
        specifier: file:../../../vendor/slack-bolt
        version: file:vendor/slack-bolt

  packages/channels/telegram:
    dependencies:
      grammy:
        specifier: file:../../../vendor/grammy
        version: file:vendor/grammy

  packages/cli:
    dependencies:
      '@va-claw/channels':
        specifier: workspace:*
        version: link:../channels
      '@va-claw/daemon':
        specifier: workspace:*
        version: link:../daemon
      '@va-claw/identity':
        specifier: workspace:*
        version: link:../identity
      '@va-claw/memory':
        specifier: workspace:*
        version: link:../memory
      '@va-claw/skills':
        specifier: workspace:*
        version: link:../skills
      commander:
        specifier: file:../../vendor/commander
        version: file:vendor/commander

  packages/daemon:
    dependencies:
      '@va-claw/skills':
        specifier: workspace:*
        version: link:../skills
      croner:
        specifier: file:../../vendor/croner
        version: file:vendor/croner

  packages/identity:
    dependencies:
      '@clack/prompts':
        specifier: file:./vendor/clack-prompts
        version: file:packages/identity/vendor/clack-prompts

  packages/memory:
    dependencies:
      '@huggingface/transformers':
        specifier: latest
        version: 3.8.1

  packages/skills: {}

